site_name: "AI for Human Factors and Safety"
site_description: "A technical primer on AI systems for Human Factors and Safety specialists"
site_url: "https://michaelhil.github.io/ai-human-factors-wiki/"
docs_dir: wiki
theme:
  name: material
  custom_dir: overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - toc.integrate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - roamlinks

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - toc:
      permalink: true
  - attr_list
  - def_list
  - footnotes

extra:
  wiki_version: "0.1.0"
  feedback_worker_url: ""

nav:
  - Home: index.md
  - Foundations:
    - foundations/index.md
    - LLM Architecture: foundations/llm-architecture.md
    - Context Windows: foundations/context-windows.md
    - Training and Alignment: foundations/training-and-alignment.md
    - Inference and Generation: foundations/inference-and-generation.md
  - Agent Architectures:
    - agent-architectures/index.md
    - Perceive-Reason-Act Loop: agent-architectures/perceive-reason-act-loop.md
    - Tool Calling: agent-architectures/tool-calling.md
    - Memory Architectures: agent-architectures/memory-architectures.md
    - Model Context Protocol: agent-architectures/model-context-protocol.md
    - Multi-Agent Taxonomy: agent-architectures/multi-agent-taxonomy.md
    - Multi-Agent Roles: agent-architectures/multi-agent-roles.md
  - Failure Modes:
    - failure-modes/index.md
    - Hallucination: failure-modes/hallucination.md
    - Calibration and Confidence: failure-modes/calibration-and-confidence.md
    - Sycophancy: failure-modes/sycophancy.md
    - Prompt Sensitivity: failure-modes/prompt-sensitivity.md
    - Output Vacuity: failure-modes/output-vacuity.md
    - Self-Correction Limitations: failure-modes/self-correction-limitations.md
    - Context Management Risks: failure-modes/context-management-risks.md
    - Multi-Agent Coordination Failures: failure-modes/multi-agent-coordination-failures.md
  - Safety & Reliability:
    - safety-and-reliability/index.md
    - Non-Determinism: safety-and-reliability/non-determinism-and-reproducibility.md
    - Degradation Characteristics: safety-and-reliability/degradation-characteristics.md
    - Opacity and Explainability: safety-and-reliability/opacity-and-explainability.md
    - "Deployment: Local vs Cloud": safety-and-reliability/deployment-local-vs-cloud.md
    - Epistemic Independence: safety-and-reliability/epistemic-independence.md
    - Monoculture Collapse: safety-and-reliability/monoculture-collapse.md
  - Human-AI Interaction:
    - human-ai-interaction/index.md
    - Situation Awareness in Human-AI Teams: human-ai-interaction/situation-awareness-in-human-ai-teams.md
  - Design Patterns:
    - design-patterns/index.md
    - RAG: design-patterns/retrieval-augmented-generation.md
    - Knowledge Graphs: design-patterns/knowledge-graphs.md
    - Hybrid Decision Pipeline: design-patterns/hybrid-decision-pipeline.md
    - Governance Gates: design-patterns/governance-gates.md
    - Delivery Modes: design-patterns/delivery-modes.md
  - Evaluation & Testing:
    - evaluation-and-testing/index.md
  - Domain Applications:
    - domain-applications/index.md
  - Reference:
    - Glossary: glossary.md
    - Summaries: summaries/index.md
